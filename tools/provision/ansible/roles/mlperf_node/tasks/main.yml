---
# Role: mlperf_node — runs bootstrap_node.sh on every host.
# The bash script is idempotent; this role simply stages and executes it.

- name: Ensure /usr/local/sbin exists
  ansible.builtin.file:
    path: /usr/local/sbin
    state: directory
    mode: "0755"

- name: Stage bootstrap_node.sh on remote host
  ansible.builtin.copy:
    # `src:` for copy is resolved relative to role's files/ dir. Our
    # bootstrap_node.sh lives outside the role, so resolve via the
    # playbook's filesystem using `lookup('file', ...)` — works whether
    # the playbook is run from the repo checkout or the role is vendored
    # into another tree.
    content: "{{ lookup('file', playbook_dir + '/../bootstrap_node.sh') }}"
    dest: /usr/local/sbin/mlperf-bootstrap-node
    owner: root
    group: root
    mode: "0755"

- name: Run bootstrap_node.sh
  ansible.builtin.command: /usr/local/sbin/mlperf-bootstrap-node
  register: bootstrap_result
  changed_when: "'Bootstrap complete.' in bootstrap_result.stdout"
  failed_when: bootstrap_result.rc != 0
  # Idempotency is enforced inside the bash script itself (every step probes
  # current state). Do NOT use `creates:` — a single component being present
  # would incorrectly skip the rest of the stack.
