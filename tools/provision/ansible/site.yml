---
# MLPerf cluster bootstrap — top-level playbook.
#
# Usage:
#   cd tools/provision/ansible
#   cp inventory.example.ini inventory.ini     # edit hosts
#   cp group_vars/all.example.yml group_vars/all.yml  # set cluster vars
#   ansible-playbook -i inventory.ini site.yml
#
# The playbook is split into three plays so that the head node is configured
# last with the shared munge key generated on the first compute node.

- name: "Phase 1 — bootstrap every node (common software stack)"
  hosts: mlperf
  become: true
  gather_facts: true
  roles:
    - role: mlperf_node

- name: "Phase 2a — read munge key from head node"
  hosts: head
  become: true
  tasks:
    - name: Slurp /etc/munge/munge.key from head
      ansible.builtin.slurp:
        src: /etc/munge/munge.key
      register: munge_key_blob

- name: "Phase 2b — install munge key on every compute node"
  hosts: compute
  become: true
  tasks:
    - name: Write /etc/munge/munge.key on compute
      ansible.builtin.copy:
        content: "{{ hostvars[groups['head'][0]].munge_key_blob.content | b64decode }}"
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: "0400"
      notify: restart munge

  handlers:
    - name: restart munge
      ansible.builtin.service:
        name: munge
        state: restarted

- name: "Phase 3 — configure Slurm head node"
  hosts: head
  become: true
  roles:
    - role: slurm_head

- name: "Phase 4 — start Slurm on compute nodes"
  hosts: compute
  become: true
  tasks:
    - name: Enable + start slurmd
      ansible.builtin.service:
        name: slurmd
        enabled: true
        state: started
